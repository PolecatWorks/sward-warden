imagePullSecrets: []
fe:
  replicaCount: 1
  image:
    repository: sward-warden-fe
    pullPolicy: IfNotPresent
    tag: latest
  service:
    type: ClusterIP
    port: 8080
  labels: {}
  podAnnotations: {}
  podLabels: {}
  securityContext: {}
  nodeSelector: {}
  affinity: {}
  tolerations: []
  serviceAccount:
    create: true
    annotations: {}
    name: ''
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 100
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: 80
be:
  replicaCount: 1
  containerPort: 8080
  lifecyclePort: 8079
  env: []
  livenessProbe:
    httpGet:
      path: /hams/alive
      port: http-lifecycle
    initialDelaySeconds: 15
    periodSeconds: 20
    timeoutSeconds: 1
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /hams/ready
      port: http-lifecycle
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 1
    failureThreshold: 3
  lifecycle: {}
  initContainer:
    env: []
  image:
    repository: sward-warden-be
    pullPolicy: IfNotPresent
    tag: latest
  service:
    type: ClusterIP
    port: 80
  volumeMounts: []
  volumes: []
  labels: {}
  podAnnotations: {}
  podLabels: {}
  securityContext: {}
  nodeSelector: {}
  affinity: {}
  tolerations: []
  serviceAccount:
    create: true
    annotations: {}
    name: ''
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 100
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: 80
  devsecops:
    AuthorizationPolicy:
      rules: []
    RequestAuthentication:
      jwtRules: []
