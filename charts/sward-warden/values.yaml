# Default values for sward-warden.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

imagePullSecrets: []

frontend:
  replicaCount: 1
  image:
    repository: sward-warden-frontend
    pullPolicy: IfNotPresent
    tag: "latest"
  service:
    type: ClusterIP
    port: 8080

backend:
  replicaCount: 1
  image:
    repository: sward-warden-backend
    pullPolicy: IfNotPresent
    tag: "latest"
  service:
    type: ClusterIP
    appPort: 8080
    lifecyclePort: 8079
