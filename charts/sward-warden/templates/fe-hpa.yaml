{{- if .Values.fe.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "sward-warden.fullname" . }}-fe
  labels:
    {{- include "sward-warden.fe.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "sward-warden.fullname" . }}-fe
  minReplicas: {{ .Values.fe.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.fe.autoscaling.maxReplicas }}
  metrics:
    {{- if .Values.fe.autoscaling.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.fe.autoscaling.targetCPUUtilizationPercentage }}
    {{- end }}
    {{- if .Values.fe.autoscaling.targetMemoryUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.fe.autoscaling.targetMemoryUtilizationPercentage }}
    {{- end }}
{{- end }}
