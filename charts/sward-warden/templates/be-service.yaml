apiVersion: v1
kind: Service
metadata:
  name: {{ include "sward-warden.fullname" . }}-be
  labels:
    app.kubernetes.io/name: be
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: {{ .Values.be.service.type }}
  ports:
    - port: {{ .Values.be.service.port }}
      targetPort: http-web
      protocol: TCP
      name: http-web
    - name: http-envoy-prom
      port: 15020
      protocol: TCP
      targetPort: 15020
  selector:
    app.kubernetes.io/name: be
    app.kubernetes.io/instance: {{ .Release.Name }}
