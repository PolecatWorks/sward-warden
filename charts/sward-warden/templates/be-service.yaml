apiVersion: v1
kind: Service
metadata:
  name: {{ include "sward-warden.fullname" . }}-be
  labels:
    {{- include "sward-warden.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http-web
      port: {{ .Values.service.port }}
      targetPort: http-web
      protocol: TCP
    - name: http-envoy-prom
      port: 15020
      protocol: TCP
      targetPort: 15020
  selector:
    {{- include "sward-warden.selectorLabels" . | nindent 4 }}
