apiVersion: v1
kind: Service
metadata:
  name: {{ include "sward-warden.fullname" . }}-fe
  labels:
    app.kubernetes.io/name: fe
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: {{ .Values.fe.service.type }}
  ports:
    - port: {{ .Values.fe.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: fe
    app.kubernetes.io/instance: {{ .Release.Name }}
