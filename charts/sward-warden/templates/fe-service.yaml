apiVersion: v1
kind: Service
metadata:
  name: {{ include "sward-warden.fullname" . }}-fe
  labels:
    {{- include "sward-warden.fe.labels" . | nindent 4 }}
spec:
  type: {{ .Values.fe.service.type }}
  ports:
    - port: {{ .Values.fe.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "sward-warden.fe.selectorLabels" . | nindent 4 }}
