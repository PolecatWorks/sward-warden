apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "sward-warden.be.serviceAccountName" . }}
  labels:
    {{- include "sward-warden.be.labels" . | nindent 4 }}
  {{- with .Values.be.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- with .Values.imagePullSecrets }}
imagePullSecrets:
  {{- toYaml . | nindent 2 }}
{{- end }}
