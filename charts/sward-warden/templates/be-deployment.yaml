{{- $configsha := tpl (include "sward-warden.be.config" .) . | sha256sum }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sward-warden.fullname" . }}-be
  labels:
    app.kubernetes.io/name: be
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.be.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: be
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      annotations:
        checksum/config: {{ $configsha }}
      labels:
        app.kubernetes.io/name: be
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: migrate
          image: "{{ .Values.be.image.repository }}:{{ .Values.be.image.tag }}"
          imagePullPolicy: {{ .Values.be.image.pullPolicy }}
          command: ["/usr/local/bin/sw-be-container", "--config-path", "/etc/sw-be/config.yaml", "--secrets-dir", "/etc/sw-be/secrets", "migrate"]
          {{- with .Values.be.initContainer.env }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts: {{- include "sward-warden.be.volumeMounts" . | nindent 12 }}
      containers:
        - name: be
          image: "{{ .Values.be.image.repository }}:{{ .Values.be.image.tag }}"
          imagePullPolicy: {{ .Values.be.image.pullPolicy }}
          command: ["/usr/local/bin/sw-be-container", "--config-path", "/etc/sw-be/config.yaml", "--secrets-dir", "/etc/sw-be/secrets", "serve"]
          env:
            {{- include "sward-warden.be.env" . | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.be.service.appPort }}
              protocol: TCP
            - name: lifecycle
              containerPort: {{ .Values.be.service.lifecyclePort }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: lifecycle
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /ready
              port: lifecycle
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts: {{- include "sward-warden.be.volumeMounts" . | nindent 12 }}
      volumes:
        {{- include "sward-warden.be.volumes" . | nindent 8 }}
