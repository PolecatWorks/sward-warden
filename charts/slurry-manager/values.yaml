# Default values for sward-manager.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

frontend:
  replicaCount: 1
  image:
    repository: sward-manager-frontend
    pullPolicy: IfNotPresent
    tag: "latest"
  service:
    type: ClusterIP
    port: 8080

backend:
  replicaCount: 1
  image:
    repository: sward-manager-backend
    pullPolicy: IfNotPresent
    tag: "latest"
  service:
    type: ClusterIP
    appPort: 8080
    lifecyclePort: 8079
