<div class="px-6 py-8">
  <div class="flex items-center gap-4 mb-6">
    <a
      routerLink="/inventory"
      class="material-symbols-outlined text-primary hover:text-primary/80"
      >arrow_back</a
    >
    <h2 class="text-3xl font-black text-primary">
      Chemical & Pesticide Inventory
    </h2>
  </div>

  <div class="bg-surface-container-low rounded-xl overflow-hidden">
    <div
      class="p-4 border-b border-surface-variant flex justify-between items-center bg-surface-container"
    >
      <h3 class="font-bold text-on-surface">Available PPPs</h3>
      <button
        (click)="openAddForm()"
        class="bg-primary text-white px-4 py-2 rounded-full text-sm font-semibold flex items-center gap-1 hover:bg-primary/90 transition-colors"
      >
        <span class="material-symbols-outlined text-sm">add</span> Add Product
      </button>
    </div>

    <!-- Form -->
    <div
      *ngIf="showForm"
      class="p-6 bg-surface-container-lowest border-b border-surface-variant"
    >
      <h4 class="font-bold text-primary mb-4">
        {{ editingId ? "Edit Product" : "Add New Product" }}
      </h4>
      <form
        [formGroup]="chemicalForm"
        (ngSubmit)="submitForm()"
        class="grid grid-cols-1 md:grid-cols-2 gap-4"
      >
        <div>
          <label class="block text-sm font-medium text-on-surface mb-1"
            >Product Name *</label
          >
          <input
            type="text"
            formControlName="name"
            class="w-full rounded-md border border-outline bg-surface p-2 text-on-surface"
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-on-surface mb-1"
            >MAPP Number *</label
          >
          <input
            type="text"
            formControlName="mapp_number"
            class="w-full rounded-md border border-outline bg-surface p-2 text-on-surface"
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-on-surface mb-1"
            >Active Ingredient</label
          >
          <input
            type="text"
            formControlName="active_ingredient"
            class="w-full rounded-md border border-outline bg-surface p-2 text-on-surface"
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-on-surface mb-1"
            >Quantity on Hand</label
          >
          <div class="flex gap-2">
            <input
              type="number"
              step="0.1"
              formControlName="quantity_on_hand"
              class="w-full rounded-md border border-outline bg-surface p-2 text-on-surface"
            />
            <select
              formControlName="unit"
              class="rounded-md border border-outline bg-surface p-2 text-on-surface w-1/3"
            >
              <option value="Litres">Litres</option>
              <option value="Kilograms">Kilograms</option>
              <option value="Units">Units</option>
            </select>
          </div>
        </div>

        <div class="md:col-span-2 flex justify-end gap-2 mt-4">
          <button
            type="button"
            (click)="closeForm()"
            class="px-4 py-2 text-primary font-semibold hover:bg-surface-variant rounded-md transition-colors"
          >
            Cancel
          </button>
          <button
            type="submit"
            [disabled]="!chemicalForm.valid"
            class="px-4 py-2 bg-primary text-white font-semibold rounded-md hover:bg-primary/90 transition-colors disabled:opacity-50"
          >
            Save
          </button>
        </div>
      </form>
    </div>

    <!-- Search & Filter (Glassmorphism Context) -->
    <div class="mb-8 flex gap-3 px-4 pt-4">
      <div class="relative flex-1">
        <span
          class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline"
          >search</span
        >
        <input
          class="w-full pl-12 pr-4 py-4 bg-surface-container-low border-none rounded-xl focus:ring-2 focus:ring-primary placeholder:text-outline-variant"
          placeholder="Find a product..."
          type="text"
          aria-label="Search products"
          [(ngModel)]="searchQuery"
        />
      </div>
      <button
        class="bg-surface-container-high p-4 rounded-xl text-primary"
        aria-label="Filter products"
      >
        <span class="material-symbols-outlined">filter_list</span>
      </button>
    </div>

    <!-- Digital Shelf -->
    <div class="divide-y divide-surface-variant">
      <ng-container *ngIf="filteredChemicals$ | async as chemicals">
        <div
          *ngIf="chemicals.length === 0"
          class="p-8 text-center text-on-surface-variant"
        >
          No chemical products in inventory.
        </div>

        <div
          *ngFor="let chem of chemicals"
          class="p-4 flex justify-between items-center hover:bg-surface-container-lowest transition-colors group"
        >
          <div>
            <h4 class="font-bold text-primary">{{ chem.name }}</h4>
            <p class="text-xs text-on-surface-variant font-mono mt-1">
              MAPP No: {{ chem.mapp_number }}
              <span
                *ngIf="chem.active_ingredient"
                class="ml-2 text-on-surface-variant"
                >({{ chem.active_ingredient }})</span
              >
            </p>
          </div>
          <div class="flex items-center gap-4">
            <div class="text-right">
              <span class="text-lg font-bold text-on-surface">{{
                chem.quantity_on_hand || "0"
              }}</span>
              <span class="text-xs text-on-surface-variant ml-1">{{
                chem.unit || "Units"
              }}</span>
            </div>

            <!-- Actions -->
            <div
              class="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity"
            >
              <button
                (click)="openEditForm(chem)"
                class="p-2 text-on-surface-variant hover:text-primary transition-colors"
                title="Edit"
              >
                <span class="material-symbols-outlined text-sm">edit</span>
              </button>
              <button
                (click)="deleteChemical(chem.id)"
                class="p-2 text-error hover:text-error/80 transition-colors"
                title="Delete"
              >
                <span class="material-symbols-outlined text-sm">delete</span>
              </button>
            </div>
          </div>
        </div>
      </ng-container>
    </div>
  </div>
</div>
