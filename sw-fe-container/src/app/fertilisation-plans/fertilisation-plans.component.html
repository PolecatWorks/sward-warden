<div class="p-6 max-w-5xl mx-auto">
  <h2 class="text-2xl font-bold mb-6">Fertilisation Plans</h2>

  <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100 mb-8">
    <h3 class="text-lg font-semibold mb-4">Create New Fertilisation Plan</h3>
    <form (ngSubmit)="addPlan()" #planForm="ngForm" class="space-y-4">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Farm</label>
          <select [(ngModel)]="newPlan.farm_id" name="farm_id" required class="w-full rounded-md border-gray-300 shadow-sm focus:border-green-500 focus:ring-green-500">
            <option [ngValue]="0">Select a farm</option>
            <option *ngFor="let farm of farms" [ngValue]="farm.id">{{ farm.name }}</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Year</label>
          <input type="number" [(ngModel)]="newPlan.year" name="year" required class="w-full rounded-md border-gray-300 shadow-sm focus:border-green-500 focus:ring-green-500">
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Plan Content</label>
        <textarea [(ngModel)]="newPlan.plan_content" name="plan_content" required rows="4" class="w-full rounded-md border-gray-300 shadow-sm focus:border-green-500 focus:ring-green-500" placeholder="Enter the details of the fertilisation plan..."></textarea>
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 pt-4 border-t border-gray-100">
        <div class="flex items-center">
          <input type="checkbox" id="derogation_status" [(ngModel)]="newPlan.derogation_status" name="derogation_status" class="h-4 w-4 text-green-600 focus:ring-green-500 border-gray-300 rounded">
          <label for="derogation_status" class="ml-2 block text-sm text-gray-900">Approved Nitrates Derogation</label>
        </div>
        <div class="flex items-center">
          <input type="checkbox" id="chemical_p_grassland" [(ngModel)]="newPlan.chemical_p_grassland" name="chemical_p_grassland" class="h-4 w-4 text-green-600 focus:ring-green-500 border-gray-300 rounded">
          <label for="chemical_p_grassland" class="ml-2 block text-sm text-gray-900">Applying Chemical P to Grassland</label>
        </div>
        <div class="flex items-center">
          <input type="checkbox" id="high_p_manure" [(ngModel)]="newPlan.high_p_manure" name="high_p_manure" class="h-4 w-4 text-green-600 focus:ring-green-500 border-gray-300 rounded">
          <label for="high_p_manure" class="ml-2 block text-sm text-gray-900">Using High-P Manure</label>
        </div>
        <div class="flex items-center">
          <input type="checkbox" id="anaerobic_digestate" [(ngModel)]="newPlan.anaerobic_digestate" name="anaerobic_digestate" class="h-4 w-4 text-green-600 focus:ring-green-500 border-gray-300 rounded">
          <label for="anaerobic_digestate" class="ml-2 block text-sm text-gray-900">Using Anaerobic Digestate</label>
        </div>
      </div>

      <button type="submit" [disabled]="!planForm.form.valid || newPlan.farm_id === 0" class="mt-4 bg-green-600 text-white px-4 py-2 rounded-md hover:bg-green-700 disabled:opacity-50">
        Save Plan
      </button>
    </form>
  </div>

  <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
    <table class="min-w-full divide-y divide-gray-200">
      <thead class="bg-gray-50">
        <tr>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Farm</th>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Year</th>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Plan Content</th>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Applicability Flags</th>
          <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
        </tr>
      </thead>
      <tbody class="bg-white divide-y divide-gray-200">
        <tr *ngFor="let plan of plans">
          <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">{{ getFarmName(plan.farm_id) }}</td>
          <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">{{ plan.year }}</td>
          <td class="px-6 py-4 text-sm text-gray-500 max-w-xs truncate">{{ plan.plan_content }}</td>
          <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
             <div class="flex flex-col gap-1">
               <span *ngIf="plan.derogation_status" class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-blue-100 text-blue-800">Derogation</span>
               <span *ngIf="plan.chemical_p_grassland" class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-purple-100 text-purple-800">Chem P</span>
               <span *ngIf="plan.high_p_manure" class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-yellow-100 text-yellow-800">High P Manure</span>
               <span *ngIf="plan.anaerobic_digestate" class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-green-100 text-green-800">Anaerobic Dig</span>
               <span *ngIf="!plan.derogation_status && !plan.chemical_p_grassland && !plan.high_p_manure && !plan.anaerobic_digestate" class="text-gray-400 italic">None</span>
             </div>
          </td>
          <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
            <button (click)="deletePlan(plan.id)" class="text-red-600 hover:text-red-900">Delete</button>
          </td>
        </tr>
        <tr *ngIf="plans.length === 0">
          <td colspan="5" class="px-6 py-4 text-center text-sm text-gray-500">No fertilisation plans recorded yet.</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
