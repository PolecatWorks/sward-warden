<div class="min-h-screen flex items-center justify-center bg-surface px-6">
  <div class="max-w-md w-full bg-surface-container-low rounded-3xl p-8 text-center shadow-lg">
    <div class="w-20 h-20 bg-error-container rounded-full flex items-center justify-center mx-auto mb-6">
      <span class="material-symbols-outlined text-on-error-container text-4xl">error</span>
    </div>
    <h1 class="text-3xl font-black text-on-surface mb-2 font-['Work_Sans']">Error</h1>
    <p class="text-on-surface-variant text-sm mb-8">{{ errorMessage }}</p>
    <button (click)="goHome()" class="w-full py-4 bg-primary text-on-primary font-bold tracking-wide active:scale-95 transition-transform rounded-xl">
      {{ isAuthError ? 'Return to Login' : 'Return to Home' }}
    </button>
  </div>
</div>
