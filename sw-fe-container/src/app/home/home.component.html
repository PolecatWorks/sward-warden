<div class="pb-4">
  <!-- Profile Hero Section -->
  <section class="px-6 pt-8 pb-12 overflow-hidden">
    <div class="relative">
      <span class="text-[10px] uppercase tracking-[0.2em] font-bold text-secondary mb-2 block">User Profile</span>
      <h2 class="editorial-headline text-5xl font-black text-primary leading-[0.9] tracking-tighter mb-4">{{ (currentUser$ | async)?.name }}</h2>
      <p class="text-on-surface-variant font-medium text-lg leading-relaxed max-w-[80%]">Dedicated to sustainable dairy and beef farming across County Antrim.</p>
    </div>
  </section>
  <!-- Quick Stats Bento -->
  <section class="px-6 grid grid-cols-2 gap-4">
    <div class="bg-surface-container-low p-6 rounded-xl flex flex-col justify-between aspect-square">
      <span class="material-symbols-outlined text-primary mb-4" style="font-variation-settings: 'FILL' 1;">location_on</span>
      <div>
        <p class="text-[10px] uppercase tracking-widest text-on-surface-variant font-bold">Region</p>
        <p class="text-xl font-bold editorial-headline text-primary">Ulster</p>
      </div>
    </div>
    <div class="bg-primary text-white p-6 rounded-xl flex flex-col justify-between aspect-square">
      <span class="material-symbols-outlined text-primary-fixed-dim mb-4" style="font-variation-settings: 'FILL' 1;">verified</span>
      <div>
        <p class="text-[10px] uppercase tracking-widest opacity-70 font-bold">Member Since</p>
        <p class="text-xl font-bold editorial-headline">March 2018</p>
      </div>
    </div>
  </section>
  <!-- Daily Insights Section -->
  <section class="mt-8 px-6">
    <div class="flex items-baseline justify-between mb-6">
      <h3 class="editorial-headline text-2xl font-bold text-primary">Daily Insights</h3>
    </div>
    <div class="grid grid-cols-2 gap-4">
      <div class="bg-surface-container p-6 rounded-xl flex flex-col justify-between aspect-square">
        <span class="material-symbols-outlined text-primary mb-4" style="font-variation-settings: 'FILL' 1;">water_drop</span>
        <div>
          <p class="text-[10px] uppercase tracking-widest text-on-surface-variant font-bold">Last Rainfall</p>
          <p class="text-xl font-bold editorial-headline text-primary">2 Days ago</p>
        </div>
      </div>
      <div class="bg-surface-container p-6 rounded-xl flex flex-col justify-between aspect-square">
        <span class="material-symbols-outlined text-primary mb-4" style="font-variation-settings: 'FILL' 1;">eco</span>
        <div>
          <p class="text-[10px] uppercase tracking-widest text-on-surface-variant font-bold">Carbon Credits</p>
          <p class="text-xl font-bold editorial-headline text-primary">12.4 t</p>
        </div>
      </div>
    </div>
  </section>
  <!-- Profile Actions -->
  <section class="mt-12 px-6 space-y-3">
    <button class="w-full py-4 bg-primary text-white rounded-full font-bold editorial-headline tracking-wide active:scale-95 transition-transform flex items-center justify-center gap-2"
      routerLink="/profile">
      <span class="material-symbols-outlined text-lg">edit</span>
      Update Profile
    </button>
    <button class="w-full py-4 bg-surface-container-high text-on-surface font-bold editorial-headline tracking-wide active:scale-95 transition-transform"
      routerLink="/reporting">
      Export Annual Report
    </button>
  </section>
</div>
