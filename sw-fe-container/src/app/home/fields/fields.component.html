    <div class="px-6 pt-4 max-w-2xl mx-auto">

    <div class="mb-4">
      <a routerLink="/farms" class="text-primary hover:underline flex items-center gap-1 font-medium text-sm">
        <span class="material-symbols-outlined text-sm">arrow_back</span> Back to Farms
      </a>
    </div>

    <!-- Header Section -->
    <section class="mb-8">
    <h1 class="text-4xl font-bold tracking-tight text-primary leading-tight mb-2">My Fields (Farm {{ farmId }})</h1>
    <p class="text-on-surface-variant font-medium">Total Managed Area: <span class="text-primary">{{ totalArea }} Hectares</span></p>
    </section>
    <!-- Search & Filter (Glassmorphism Context) -->
    <div class="mb-8 flex gap-3">
    <div class="relative flex-1">
    <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">search</span>
    <input class="w-full pl-12 pr-4 py-4 bg-surface-container-low border-none rounded-xl focus:ring-2 focus:ring-primary placeholder:text-outline-variant" placeholder="Find a field..." type="text" aria-label="Search fields"/>
    </div>
    <button class="bg-surface-container-high p-4 rounded-xl text-primary" aria-label="Filter fields">
    <span class="material-symbols-outlined">filter_list</span>
    </button>
    </div>
    <!-- Bento-style Field Grid -->
    <div class="grid grid-cols-1 gap-6">
    <!-- Minimalist Field Cards dynamically rendered -->
    <div *ngFor="let field of fields" class="bg-surface-container-lowest p-6 rounded-xl shadow-sm flex flex-col gap-4">
        <div class="flex items-center justify-between">
            <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-tertiary-container rounded-lg flex items-center justify-center text-white">
            <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">agriculture</span>
            </div>
            <div>
            <h2 class="text-lg font-bold text-on-surface">{{ field.name }}</h2>
            <p class="text-xs text-on-surface-variant">ID: {{ field.id }}</p>
            </div>
            </div>
            <div class="text-right">
            <p class="text-xl font-black text-on-surface">{{ field.area_hectares }}</p>
            <p class="text-[10px] uppercase font-bold text-outline">Hectares</p>
            </div>
        </div>
        <div class="flex justify-end gap-2 border-t border-surface-container-low pt-4">
            <button class="px-4 py-2 text-sm font-semibold text-primary bg-primary-container/10 hover:bg-primary-container/20 rounded-lg transition-colors" [routerLink]="['/fields', field.id]" [attr.aria-label]="'View details for ' + field.name">View Details</button>
            <button *ngIf="field.id" class="p-2 text-error hover:bg-error/10 rounded-full transition-colors" (click)="deleteField(field.id)" [attr.aria-label]="'Delete ' + field.name">Delete</button>
        </div>
    </div>

    <div *ngIf="fields.length === 0" class="text-center p-8 bg-surface-container-lowest rounded-xl">
        <p class="text-on-surface-variant">No fields found for this farm.</p>
    </div>

    </div>
    <!-- CTA Section -->
    <div class="mt-10 mb-8">

      <div *ngIf="showAddForm" class="bg-surface-container-lowest p-6 rounded-xl shadow-md mb-6">
        <h3 class="text-lg font-bold text-primary mb-4">Add New Field</h3>
        <div class="flex flex-col gap-4">
            <div class="flex flex-col gap-1">
                <label for="newFieldName" class="text-sm font-medium text-on-surface-variant">Field Name</label>
                <input id="newFieldName" type="text" [(ngModel)]="newFieldName" class="w-full px-4 py-3 bg-surface-container-low border border-surface-container-high rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent" placeholder="e.g. North Pasture">
            </div>
            <div class="flex flex-col gap-1">
                <label for="newFieldArea" class="text-sm font-medium text-on-surface-variant">Area (Hectares)</label>
                <input id="newFieldArea" type="text" [(ngModel)]="newFieldArea" class="w-full px-4 py-3 bg-surface-container-low border border-surface-container-high rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent" placeholder="e.g. 12.5">
            </div>
            <div class="flex gap-2 justify-end mt-2">
                <button (click)="toggleAddForm()" class="px-5 py-2 font-semibold text-on-surface-variant bg-surface-container-high rounded-lg hover:bg-surface-variant transition-colors">Cancel</button>
                <button (click)="addField()" [disabled]="!newFieldName || !newFieldArea" class="px-5 py-2 font-semibold text-on-primary bg-primary rounded-lg hover:opacity-90 transition-opacity disabled:opacity-50">Save Field</button>
            </div>
        </div>
      </div>

    <div *ngIf="!showAddForm" class="text-center">
    <p class="text-sm text-outline-variant font-medium mb-4 italic">Updated just now</p>
    <button (click)="toggleAddForm()" class="w-full py-5 bg-primary text-on-primary rounded-xl font-bold flex items-center justify-center gap-3 shadow-xl active:scale-95 transition-transform">
    <span class="material-symbols-outlined">add_circle</span>
                    Add Field
                </button>
    </div>
    </div>
    </div>
    <!-- FAB -->
    <div class="fixed bottom-24 right-6 flex flex-col items-center justify-center z-40">
    <button class="w-16 h-16 bg-primary-container text-white rounded-full shadow-2xl flex items-center justify-center active:scale-90 transition-transform" routerLink="/topology" aria-label="View map">
    <span class="material-symbols-outlined text-3xl">map</span>
    </button>
    </div>
