<main class="px-6 pt-4 space-y-8 pb-4">
  <!-- Hero Section / Statistics Overview -->
  <section class="space-y-4">
    <div class="flex flex-col gap-1">
      <p class="text-on-surface-variant font-medium text-sm tracking-wide uppercase">Operational Overview</p>
      <h1 class="text-4xl font-extrabold text-primary tracking-tighter" id="portfolio-heading">
        Your Portfolio
      </h1>
    </div>
  </section>

  <!-- Error Banner -->
  <div *ngIf="errorMessage" class="bg-error-container text-on-error-container px-4 py-3 rounded-xl flex items-center gap-3" role="alert" aria-live="assertive">
    <span class="material-symbols-outlined text-sm">error</span>
    <span class="text-sm font-medium">{{ errorMessage }}</span>
    <button (click)="errorMessage = null" class="ml-auto" aria-label="Dismiss error">
      <span class="material-symbols-outlined text-sm">close</span>
    </button>
  </div>

  <!-- Loading Skeleton -->
  <div *ngIf="isLoading" class="space-y-4" aria-label="Loading data">
    <div class="bg-surface-container-lowest rounded-xl overflow-hidden shadow-sm animate-pulse">
      <div class="h-40 bg-surface-container-high"></div>
      <div class="p-4 flex gap-4">
        <div class="h-6 w-24 bg-surface-container-high rounded-md"></div>
        <div class="h-6 w-16 bg-surface-container-high rounded-md"></div>
      </div>
    </div>
  </div>

  <div *ngIf="!isLoading">
    <!-- Empty State (No Farms) -->
    <div *ngIf="farms.length === 0" class="flex flex-col items-center justify-center py-16 text-center space-y-4" data-testid="empty-state">
      <span class="material-symbols-outlined text-6xl text-on-surface-variant/40">agriculture</span>
      <div class="space-y-1">
        <p class="text-lg font-semibold text-on-surface">No farms yet</p>
        <p class="text-sm text-on-surface-variant">Tap the + button below to add your first farm.</p>
      </div>
    </div>

    <!-- Content (Farms exist) -->
    <div *ngIf="farms.length > 0" class="space-y-6">
      <div class="flex justify-between items-end">
        <h2 class="text-2xl font-bold tracking-tight text-on-surface">Registered Farms</h2>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" [attr.data-testid]="'farms-list'">
        <div *ngFor="let farm of farms; let i = index" class="bg-surface-container-lowest rounded-xl overflow-hidden shadow-sm group hover:shadow-md transition-shadow cursor-pointer" [attr.data-testid]="'farm-card-' + farm.id" [routerLink]="['/farms', farm.id]">
          <div class="h-40 relative">
            <img *ngIf="i % 3 === 0" alt="{{ farm.name }}" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAtKP4X7e4twRuDt4tLqhsErU--zOjrZ08jgLGBuJQgeEfqhDzuypE98m4l1aHiinATw5qrN2GWVchDtjhvre9LQbYGGByB3tkr_hcErnAIcX7-GbOWOYaJzhfM_JPiNYSn--YmRosGsmGj7gQiQPMmpwKYf_uVc6_4wcAM0j-8UsLGNKLQjqwAxAUyXQrhLd35_gR9hLLYc28_gt6DlJV9LuuL_rFtEqG5FxzRvMYDJZmP8LScItDHJiPdaJ3YpcKmf1TCnqBavQ"/>
            <img *ngIf="i % 3 === 1" alt="{{ farm.name }}" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBFSKBzWHF9vDzzRotdi_g4qMbnotM7ZmwucIBilC93PmuacgH147f_4bDlZ0X5fKiPg058S5lbaKHC75goD_GOuKKoz1DlDPZo4l8eAgXxWmTZKm8vtaw30TKMY2RFkvFDsHwhLI-ErfC3KAzu9HMY7w0TuY4ICY8cDTO1lw9Q1Afpj_ZdHffZXPH1EKVwworohW5DM0rxWl0QKrnFfzHl6Wgd6qLK6Yle7UhyTla_nKMWbz61lrKCbCypUkngSNUeMlZZD56yrg"/>
            <img *ngIf="i % 3 === 2" alt="{{ farm.name }}" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCYcfg-iJ5KQb9qyAMulKfKx2VIt5t8RzLAvVEYO0GRlyGTJroEgZJh1XqB2Pj4lxdTEJD9psrZ96ONUGOwpWzyMZKdMGi4Emyay9fksZ6J8nS9Apag8yChLQNJLnrUE384JZJ5dBKVHjuXhKfTQeWOu7Sg-0xOTzX8OOuLAkN132TrPzGvH7ce8MHe3eFZpFBLCSFUBXAMNlX19zIqa3JWn_KfePjVVQCUvmRAp43UHJRgLTKbg1lRvYH1Z5Jn8N13nre7Z-zIpQ"/>
            <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"></div>
            <div class="absolute bottom-4 left-4 text-white">
              <h3 class="text-xl font-bold">{{ farm.name }}</h3>
              <p class="text-xs opacity-90 flex items-center gap-1">
                <span class="material-symbols-outlined text-xs">location_on</span>
                {{ farm.location }}
              </p>
            </div>
          </div>
          <div class="p-4 flex justify-between items-center bg-surface-container-low">
            <div class="flex gap-4">
              <div class="flex flex-col">
                <span class="text-[10px] uppercase tracking-widest font-bold text-on-surface-variant">Fields</span>
                <span class="text-lg font-bold text-primary">{{ farmFieldCounts[farm.id!] || 0 }}</span>
              </div>
              <div class="flex flex-col">
                <span class="text-[10px] uppercase tracking-widest font-bold text-on-surface-variant">Status</span>
                <span class="text-sm font-semibold text-tertiary">Active</span>
              </div>
            </div>
            <div class="flex items-center gap-2">
              <span class="material-symbols-outlined text-on-surface-variant group-hover:translate-x-1 transition-transform">chevron_right</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>

<!-- FAB: Add New Farm -->
<button (click)="openAddFarmModal()" id="add-farm-fab" class="fixed right-6 bottom-24 lg:bottom-8 w-14 h-14 bg-primary text-on-primary rounded-full shadow-2xl flex items-center justify-center z-40 active:scale-90 transition-transform" aria-label="Add new farm">
  <span class="material-symbols-outlined text-2xl">add</span>
</button>

<!-- Add Farm Modal -->
<div *ngIf="showAddFarmModal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm p-4" role="dialog" aria-modal="true" aria-labelledby="add-farm-modal-title">
  <div class="bg-surface rounded-2xl w-full max-w-md shadow-2xl overflow-hidden">
    <div class="px-6 py-4 border-b border-surface-variant flex justify-between items-center">
      <h3 id="add-farm-modal-title" class="text-xl font-bold text-on-surface">Add New Farm</h3>
      <button (click)="closeAddFarmModal()" id="close-modal-btn" class="text-on-surface-variant hover:text-on-surface rounded-full p-1 transition-colors" aria-label="Close dialog">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>
    <div class="p-6 space-y-4">
      <div class="space-y-2">
        <label for="farm-name-input" class="text-sm font-medium text-on-surface-variant">Farm Name</label>
        <input id="farm-name-input" type="text" [(ngModel)]="newFarmName" placeholder="e.g. Sunny Brook Farm"
          class="w-full px-4 py-3 bg-surface-container-low border border-outline-variant rounded-xl focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all">
      </div>
      <div class="space-y-2">
        <label for="farm-location-input" class="text-sm font-medium text-on-surface-variant">Location</label>
        <input id="farm-location-input" type="text" [(ngModel)]="newFarmLocation" placeholder="e.g. County Down, Northern Ireland"
          class="w-full px-4 py-3 bg-surface-container-low border border-outline-variant rounded-xl focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all">
      </div>
    </div>
    <div class="px-6 py-4 bg-surface-container-low flex justify-end gap-3">
      <button (click)="closeAddFarmModal()" id="cancel-modal-btn" class="px-5 py-2.5 rounded-full text-on-surface-variant font-medium hover:bg-surface-variant transition-colors">
        Cancel
      </button>
      <button (click)="addFarm()" id="save-farm-btn" [disabled]="!newFarmName || !newFarmLocation || isSaving"
        class="px-5 py-2.5 rounded-full bg-primary text-on-primary font-medium hover:bg-primary/90 disabled:opacity-50 transition-colors flex items-center gap-2">
        <span *ngIf="isSaving" class="material-symbols-outlined text-sm animate-spin">progress_activity</span>
        {{ isSaving ? 'Saving...' : 'Save Farm' }}
      </button>
    </div>
  </div>
</div>
