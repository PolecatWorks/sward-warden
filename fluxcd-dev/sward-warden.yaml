---
# If this is failing with 'DENIED', ensure the PAT in 'sw-gh-pat' has 'read:packages' scope.
# For private GHCR repositories, the username must be the GitHub username.
# Using a 'kubernetes.io/dockerconfigjson' secret is also recommended for OCI.

# kubectl create secret docker-registry ghcr-docker-auth -n sward-warden-dev \
#   --docker-server=ghcr.io \
#   --docker-username=<USERNAME> \
#   --docker-password='<YOUR_WORKING_PAT>'

apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: sward-warden
spec:
  interval: 10m
  url: oci://ghcr.io/polecatworks/sward-warden/helm/sward-warden
  secretRef:
    name: ghcr-docker-auth
  ref:
    semver: ">= 0.1.x-0"
    semverFilter: .*-main-*
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sward-warden
spec:
  releaseName: sward-warden
  chartRef:
    kind: OCIRepository
    name: sward-warden
  interval: 50m
  install:
    remediation:
      retries: 3
  values:
    imagePullSecrets:
      - name: ghcr-docker-auth
    backend:
      image:
        repository: ghcr.io/polecatworks/sward-warden-backend
        tag: main
        pullPolicy: Always
    frontend:
      image:
        repository: ghcr.io/polecatworks/sward-warden-frontend
        tag: main
        pullPolicy: Always
      configs:
        database:
          url: postgresql://cnpg-db0-cluster-rw.dbs:5432/sward_warden
    volumes:
      - name: secrets
        projected:
          sources:
            - secret:
                name: db0-sward-warden-user
                items:
                  - key: username
                    path: persistence/db/connection/username
                  - key: password
                    path: persistence/db/connection/password
