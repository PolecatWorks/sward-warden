---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sward-warden
spec:
  releaseName: sward-warden
  chartRef:
    kind: OCIRepository
    name: sward-warden
  interval: 50m
  install:
    remediation:
      retries: 3
  values:
    imagePullSecrets:
      - name: ghcr-docker-auth
    initContainer:
      env:
        - name: SP_BE__DEBUGGING__FAIL_DEBUG_DELAY
          value: "60s"
    image:
      repository: ghcr.io/polecatworks/sward-warden-be
      tag: main
      pullPolicy: Always
    config:
      webservice:
        address: http://0.0.0.0:8080/sward
        forwarding_headers: []
        cors:
          allow_origins: []
          allow_methods: ["GET", "POST", "PUT", "DELETE", "PATCH", "OPTIONS"]
          allow_headers: ["content-type", "authorization", "x-user-role"]
        timeout: "30s"
        max_connections: 100
      database:
        url:
          url: postgresql://cnpg-db0-cluster-rw.dbs:5432/sward_warden
          username_file: persistence/db/connection/username
          password_file: persistence/db/connection/password
        max_connections: 10
      runtime:
        threads: 0
        stack_size: 3000000
        name: "default"
      debugging:
        fail_debug_delay: null

    volumes:
      - name: config
        configMap:
          name: '{{ include "sward-warden.fullname" . }}-be'
      - name: secrets
        projected:
          sources:
            - secret:
                name: db0-sward-warden-user
                items:
                  - key: username
                    path: persistence/db/connection/username
                  - key: password
                    path: persistence/db/connection/password
    volumeMounts:
      - name: config
        mountPath: /etc/sw-be/config.yaml
        subPath: config.yaml
      - name: secrets
        mountPath: /etc/sw-be/secrets
