---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: sward-warden
spec:
  interval: 10m
  url: oci://ghcr.io/polecatworks/sward-warden/helm/sward-warden
  secretRef:
    name: ghcr-docker-auth
  ref:
    semver: ">= 0.1.x-0"
    semverFilter: .*-main-*


