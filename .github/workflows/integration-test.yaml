name: Integration Tests
on:
  pull_request:
    branches: [Main]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR Number to target (e.g. 188). Defaults to 'local'."
        required: false
        default: "local"

concurrency:
  group: k8s-integration-env
  cancel-in-progress: false

permissions:
  contents: read
  packages: read
  id-token: write

jobs:
  integration:
    runs-on: polecatworks-runner
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'sp-be-container/**'
              - '.github/workflows/sp-be-docker-publish.yml'
            frontend:
              - 'sp-fe-container/**'
              - '.github/workflows/sp-fe-docker-publish.yml'
            spec:
              - 'spec/**'

      - name: Prepare Image Variables
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          PR_NUMBER="${{ github.event.pull_request.number || github.event.inputs.pr_number || 'local' }}"
          echo "PR_NUMBER=$PR_NUMBER" >> $GITHUB_ENV

          if [[ "${{ steps.filter.outputs.backend }}" == "true" ]]; then
            echo "SP_BE_IMAGE=ghcr.io/${REPO_LOWER}-be/dev" >> $GITHUB_ENV
            echo "SP_BE_TAG=pr-${PR_NUMBER}" >> $GITHUB_ENV
          else
            echo "SP_BE_IMAGE=ghcr.io/${REPO_LOWER}-be" >> $GITHUB_ENV
            echo "SP_BE_TAG=Main" >> $GITHUB_ENV
          fi

          if [[ "${{ steps.filter.outputs.frontend }}" == "true" ]]; then
            echo "SP_FE_IMAGE=ghcr.io/${REPO_LOWER}-ui/dev" >> $GITHUB_ENV
            echo "SP_FE_TAG=pr-${PR_NUMBER}" >> $GITHUB_ENV
          else
            echo "SP_FE_IMAGE=ghcr.io/${REPO_LOWER}-ui" >> $GITHUB_ENV
            echo "SP_FE_TAG=Main" >> $GITHUB_ENV
          fi

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "latest"

      - name: Configure and Check Kubeconfig
        run: |
          # Configure a local context for the ServiceAccount
          kubectl config set-cluster local --server=https://kubernetes.default.svc --certificate-authority=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          kubectl config set-credentials runner --token=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
          kubectl config set-context local --cluster=local --user=runner
          kubectl config use-context local

          echo "Kubernetes access check:"
          kubectl get nodes || echo "Warning: Could not list nodes. Check ClusterRole permissions."
          kubectl config view
          kubectl config get-contexts

      - name: Install GitHub CLI
        run: |
          GH_VERSION=$(curl -s https://api.github.com/repos/cli/cli/releases/latest | jq -r .tag_name | sed 's/v//')
          curl -sSL "https://github.com/cli/cli/releases/download/v${GH_VERSION}/gh_${GH_VERSION}_linux_amd64.tar.gz" -o gh.tar.gz
          tar xzf gh.tar.gz
          # Move it to a folder in your PATH (like /usr/local/bin) or just add it to GITHUB_PATH
          sudo mv gh_${GH_VERSION}_linux_amd64/bin/gh /usr/local/bin/
          gh --version

      # THIS IS BROKEN
      # - name: Install GitHub CLI
      #   uses: actions4gh/setup-gh@v1

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: 'latest'

      - name: Login to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Create Mock Secrets
        run: |
          NAMESPACE="slurry-manager-pr-${{ env.PR_NUMBER }}"
          # Ensure namespace exists
          kubectl create namespace $NAMESPACE --dry-run=client -o yaml | kubectl apply -f -
          # Create a mock secret for sp-be (required by Helm chart)
          kubectl create secret generic sp-be -n $NAMESPACE --from-literal=database_password=mock --dry-run=client -o yaml | kubectl apply -f -

      - name: Run Integration Tests with Garden
        uses: garden-io/garden-action@v2
        env:
          PR_NUMBER: ${{ env.PR_NUMBER }}
          GARDEN_KUBECONTEXT: local
          SP_BE_IMAGE: ${{ env.SP_BE_IMAGE }}
          SP_BE_TAG: ${{ env.SP_BE_TAG }}
          SP_FE_IMAGE: ${{ env.SP_FE_IMAGE }}
          SP_FE_TAG: ${{ env.SP_FE_TAG }}
        with:
          command: test --env pr



      - name: Teardown Garden Environment
        uses: garden-io/garden-action@v2
        if: always()
        env:
          PR_NUMBER: ${{ env.PR_NUMBER }}
          GARDEN_KUBECONTEXT: local
        with:
          command: delete environment --env pr --force
