name: Integration Tests
on:
  pull_request:
    branches: [main]
  merge_group:
    branches: [main]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR Number to target (e.g. 188). Defaults to 'local'."
        required: false
        default: "local"


concurrency:
  group: k8s-integration-env-${{ github.event.pull_request.number || github.event.inputs.pr_number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  packages: read
  id-token: write

jobs:
  check-paths:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      spec: ${{ steps.filter.outputs.spec }}
      run_tests: ${{ steps.filter.outputs.run_tests }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3.0.2
        id: filter
        with:
          filters: |
            backend:
              - 'sw-be-container/**'
              - '.github/workflows/sw-be-docker-publish.yml'
            frontend:
              - 'sw-fe-container/**'
              - '.github/workflows/sw-fe-docker-publish.yml'
            spec:
              - 'spec/**'
            run_tests:
              - 'sw-be-container/**'
              - '.github/workflows/sw-be-docker-publish.yml'
              - 'sw-fe-container/**'
              - '.github/workflows/sw-fe-docker-publish.yml'
              - 'charts/**'
              - '.github/workflows/helm-ci-pr.yaml'
              - '.github/workflows/helm-ci-main.yaml'
              - 'integration-tests/**'
              - '.github/workflows/integration-test.yaml'

  run-tests:
    needs: check-paths
    if: needs.check-paths.outputs.run_tests == 'true' && github.event_name == 'merge_group'
    runs-on: polecatworks-runner
    steps:
      - uses: actions/checkout@v4

      - name: Fetch History without gh-pages
        run: |
          git config --add remote.origin.fetch ^refs/heads/gh-pages
          if [ -f .git/shallow ]; then
            git fetch --unshallow
          fi

      - name: Prepare Image Variables
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          if [ "${{ github.event_name }}" == "merge_group" ]; then
            HEAD_REF="${{ github.event.merge_group.head_ref }}"
            if [[ $HEAD_REF =~ pr-([0-9]+)- ]]; then
              PR_NUMBER="${BASH_REMATCH[1]}"
            else
              PR_NUMBER="${{ github.run_id }}"
            fi
          else
            PR_NUMBER="${{ github.event.pull_request.number || github.event.inputs.pr_number || github.run_id }}"
          fi
          echo "PR_NUMBER=$PR_NUMBER" >> $GITHUB_ENV
          echo "ARCH=$(uname -m)" >> $GITHUB_ENV

          if [[ "${{ needs.check-paths.outputs.backend }}" == "true" ]]; then
            BACKEND_SHA=$(git log -1 --format=%H -- sw-be-container/ .github/workflows/sw-be-docker-publish.yml)
            echo "SW_BE_IMAGE=ghcr.io/${REPO_LOWER}-be/dev" >> $GITHUB_ENV
            echo "SW_BE_TAG=sha-$BACKEND_SHA" >> $GITHUB_ENV
          else
            echo "SW_BE_IMAGE=ghcr.io/${REPO_LOWER}-be" >> $GITHUB_ENV
            echo "SW_BE_TAG=main" >> $GITHUB_ENV
          fi

          if [[ "${{ needs.check-paths.outputs.frontend }}" == "true" ]]; then
            FRONTEND_SHA=$(git log -1 --format=%H -- sw-fe-container/ .github/workflows/sw-fe-docker-publish.yml)
            echo "SW_FE_IMAGE=ghcr.io/${REPO_LOWER}-fe/dev" >> $GITHUB_ENV
            echo "SW_FE_TAG=sha-$FRONTEND_SHA" >> $GITHUB_ENV
          else
            echo "SW_FE_IMAGE=ghcr.io/${REPO_LOWER}-fe" >> $GITHUB_ENV
            echo "SW_FE_TAG=main" >> $GITHUB_ENV
          fi

      - name: Install GitHub CLI
        run: |
          if [ "$ARCH" = "aarch64" ] || [ "$ARCH" = "arm64" ]; then
            GH_ARCH="arm64"
          else
            GH_ARCH="amd64"
          fi

          # Fetch the latest GH version using github api, with auth to prevent rate limits
          GH_VERSION=$(curl -sL -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" https://api.github.com/repos/cli/cli/releases/latest | jq -r .tag_name | sed 's/v//' || echo "")
          if [ -z "$GH_VERSION" ] || [ "$GH_VERSION" == "null" ]; then
            echo "Failed to get GH_VERSION, falling back to a known version"
            GH_VERSION="2.54.0"
          fi

          # Retry download up to 5 times
          for i in 1 2 3 4 5; do
            if curl -sSL -f "https://github.com/cli/cli/releases/download/v${GH_VERSION}/gh_${GH_VERSION}_linux_${GH_ARCH}.tar.gz" -o gh.tar.gz; then
              break
            else
              echo "Download failed, retrying in 10s..."
              sleep 10
            fi
          done

          if [ ! -f gh.tar.gz ]; then
            echo "Failed to download gh cli after retries!"
          else
            tar xzf gh.tar.gz
            # Add it to GITHUB_PATH so subsequent steps can use it
            echo "$(pwd)/gh_${GH_VERSION}_linux_${GH_ARCH}/bin" >> $GITHUB_PATH
            chmod +x $(pwd)/gh_${GH_VERSION}_linux_${GH_ARCH}/bin/gh
            # Also move to a directory already in PATH just in case
            mkdir -p $HOME/.local/bin
            mv gh_${GH_VERSION}_linux_${GH_ARCH}/bin/gh $HOME/.local/bin/ || true
            echo "$HOME/.local/bin" >> $GITHUB_PATH
            chmod +x $HOME/.local/bin/gh
            $HOME/.local/bin/gh --version
          fi

      - name: Install Garden
        run: |
          if [ "$ARCH" = "aarch64" ] || [ "$ARCH" = "arm64" ]; then
            GARDEN_ARCH="arm64"
          else
            GARDEN_ARCH="amd64"
          fi

          GARDEN_VERSION="0.13.35"
          # Try to get latest version but fall back if API is unreachable
          LATEST_VERSION=$(curl -sL -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" https://api.github.com/repos/garden-io/garden/releases/latest | jq -r .tag_name | sed 's/v//' || echo "")
          if [ -n "$LATEST_VERSION" ] && [ "$LATEST_VERSION" != "null" ]; then
            GARDEN_VERSION=$LATEST_VERSION
          fi
          echo "Using Garden version $GARDEN_VERSION"

          for i in 1 2 3 4 5; do
            if curl -sSL -f "https://github.com/garden-io/garden/releases/download/${GARDEN_VERSION}/garden-${GARDEN_VERSION}-linux-${GARDEN_ARCH}.tar.gz" -o garden.tar.gz; then
              break
            else
              echo "Download failed, retrying in 10s..."
              sleep 10
            fi
          done

          if [ ! -f garden.tar.gz ]; then
            echo "Failed to download Garden after retries!"
            exit 1
          fi
          tar xzf garden.tar.gz
          echo "$(pwd)/linux-${GARDEN_ARCH}" >> $GITHUB_PATH
          chmod +x $(pwd)/linux-${GARDEN_ARCH}/garden
          ./linux-${GARDEN_ARCH}/garden version

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "latest"

      - name: Configure and Check Kubeconfig
        run: |
          # Configure a local context for the ServiceAccount
          kubectl config set-cluster local --server=https://kubernetes.default.svc --certificate-authority=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          kubectl config set-credentials runner --token=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
          kubectl config set-context local --cluster=local --user=runner
          kubectl config use-context local

          echo "Kubernetes access check:"
          kubectl get nodes || echo "Warning: Could not list nodes. Check ClusterRole permissions."
          kubectl config view
          kubectl config get-contexts

      - name: Set up Helm
        uses: azure/setup-helm@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          version: "latest"

      - name: Clone Sibling Repos
        run: |
          git clone https://${{ secrets.GH_PAT }}@github.com/PolecatWorks/Mfe-shell.git ../Mfe-shell

      - name: Configure Helm and Docker
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Create Mock Secrets
        run: |
          NAMESPACE="sward-warden-pr-${{ env.PR_NUMBER }}"
          # Wipe the namespace clean to prevent stale/broken StatefulSets from blocking the run
          kubectl delete namespace $NAMESPACE --ignore-not-found
          # Ensure namespace exists
          kubectl create namespace $NAMESPACE --dry-run=client -o yaml | kubectl apply -f -
          kubectl label namespace $NAMESPACE istio-injection=enabled --overwrite
          # Create a mock secret for sw-be (required by Helm chart)
          kubectl create secret generic sw-be -n $NAMESPACE --from-literal=database_username=mock-user --from-literal=database_password=mock-password --dry-run=client -o yaml | kubectl apply -f - # pragma: allowlist secret
          # Create docker-registry secret for pulling private images
          kubectl create secret docker-registry ghcr-secret -n $NAMESPACE \
            --docker-server=ghcr.io \
            --docker-username=${{ github.actor }} \
            --docker-password=${{ secrets.GITHUB_TOKEN }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Debug Environment Variables
        run: |
          echo "SW_BE_IMAGE: $SW_BE_IMAGE"
          echo "SW_BE_TAG: $SW_BE_TAG"
          echo "SW_FE_IMAGE: $SW_FE_IMAGE"
          echo "SW_FE_TAG: $SW_FE_TAG"
          echo "PR_NUMBER: $PR_NUMBER"


      - name: Wait for Docker Images
        run: |
          echo "Waiting for backend image $SW_BE_IMAGE:$SW_BE_TAG..."
          for i in {1..60}; do
            if docker manifest inspect "$SW_BE_IMAGE:$SW_BE_TAG" >/dev/null 2>&1; then
              echo "Backend image is available!"
              break
            fi
            echo "Backend image not available yet. Waiting 10s... ($i/60)"
            sleep 10
          done
          if ! docker manifest inspect "$SW_BE_IMAGE:$SW_BE_TAG" >/dev/null 2>&1; then
            echo "Error: Backend image $SW_BE_IMAGE:$SW_BE_TAG was not built/pushed in time."
            exit 1
          fi

          echo "Waiting for frontend image $SW_FE_IMAGE:$SW_FE_TAG..."
          for i in {1..60}; do
            if docker manifest inspect "$SW_FE_IMAGE:$SW_FE_TAG" >/dev/null 2>&1; then
              echo "Frontend image is available!"
              break
            fi
            echo "Frontend image not available yet. Waiting 10s... ($i/60)"
            sleep 10
          done
          if ! docker manifest inspect "$SW_FE_IMAGE:$SW_FE_TAG" >/dev/null 2>&1; then
            echo "Error: Frontend image $SW_FE_IMAGE:$SW_FE_TAG was not built/pushed in time."
            exit 1
          fi

      - name: Run Integration Tests with Garden
        env:
          PR_NUMBER: ${{ env.PR_NUMBER }}
          GARDEN_KUBECONTEXT: local
          GHCR_READER_TOKEN: ${{ secrets.GHCR_READER_TOKEN }}
        run: |
          garden test --env pr \
            --log-level verbose \
            --show-timestamps \
            --var sw-be-image="$SW_BE_IMAGE" \
            --var sw-be-tag="$SW_BE_TAG" \
            --var sw-fe-image="$SW_FE_IMAGE" \
            --var sw-fe-tag="$SW_FE_TAG"

      - name: Extract Test Results
        if: always()
        run: |
          mkdir -p ./robot-results
          if [ -d "integration-tests/reports" ] && [ "$(ls -A integration-tests/reports)" ]; then
            cp -r integration-tests/reports/* ./robot-results/
          else
            echo "Warning: integration-tests/reports is empty or does not exist."
            NAMESPACE="sward-warden-pr-${{ env.PR_NUMBER }}"
            kubectl cp $NAMESPACE/robot-test-runner:/tmp/reports ./robot-results || echo "Failed to copy test results"
          fi

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: robot-test-results
          path: ./robot-results
          retention-days: 3

      - name: Deploy Reports to GitHub Pages
        if: always()
        env:
          PR_NUMBER: ${{ env.PR_NUMBER }}
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ] || [ "${{ github.event_name }}" == "merge_group" ]; then
            TARGET_DIR="pr/${{ env.PR_NUMBER }}"
          else
            TARGET_DIR="main"
          fi

          # Configure Git
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          export GIT_EDITOR=true

          # Initialize a repository for sparse checkout
          mkdir gh-pages-repo
          cd gh-pages-repo
          git init
          git remote add origin https://x-token-auth:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

          # Enable sparse checkout
          git config core.sparseCheckout true
          git sparse-checkout init --no-cone

          # Configure it to only track the target directory and all .timestamp files (for pruning checks)
          git sparse-checkout set "$TARGET_DIR" "pr/*/.timestamp"

          # Fetch only the gh-pages branch with depth 1 to speed up checkout
          git fetch --depth 1 origin gh-pages
          git checkout gh-pages
          cd ..

          # Run a retry loop for copying, committing, and pushing
          for i in {1..5}; do
            echo "Attempt $i to publish test results..."

            # Clean and update the target dir inside the cloned repo
            rm -rf gh-pages-repo/$TARGET_DIR
            mkdir -p gh-pages-repo/$TARGET_DIR
            cp -r ./robot-results/* gh-pages-repo/$TARGET_DIR/ || true
            date +%s > gh-pages-repo/$TARGET_DIR/.timestamp

            # Prune PR reports older than 7 days using Python (still works because we checked out pr/*/.timestamp)
            python3 -c 'import sys, textwrap; exec(textwrap.dedent(sys.argv[1]))' '
            import os, time, shutil
            now = time.time()
            pr_dir = "gh-pages-repo/pr"
            if os.path.exists(pr_dir):
                for entry in os.listdir(pr_dir):
                    path = os.path.join(pr_dir, entry)
                    if os.path.isdir(path):
                        ts_file = os.path.join(path, ".timestamp")
                        if os.path.exists(ts_file):
                            try:
                                with open(ts_file, "r") as f:
                                    ts = float(f.read().strip())
                                    if now - ts > 7 * 24 * 3600:
                                        print(f"Pruning old PR report: {path}")
                                        shutil.rmtree(path)
                            except Exception as e:
                                print(f"Error checking timestamp for {path}: {e}")
            '

            # Commit and push
            cd gh-pages-repo
            git add .
            if git diff --quiet && git diff --staged --quiet; then
              echo "No changes to commit."
              cd ..
              break
            fi

            git commit -m "Deploy reports for PR ${{ env.PR_NUMBER }} / $TARGET_DIR"

            if git push origin gh-pages; then
              echo "Successfully deployed!"
              cd ..
              break
            fi

            echo "Push failed, pulling latest changes and retrying..."
            git pull --rebase -Xtheirs --no-edit origin gh-pages
            cd ..

            sleep 5
          done

      - name: Comment PR with Report Link
        if: always() && (github.event_name == 'pull_request' || github.event_name == 'merge_group')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Ensure repo name formatting is correct for the URL (lowercase owner and repo name)
          REPO_NAME=$(echo "${{ github.repository }}" | cut -d'/' -f2 | tr '[:upper:]' '[:lower:]')
          OWNER_NAME=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPORT_URL="https://${OWNER_NAME}.github.io/${REPO_NAME}/pr/${{ env.PR_NUMBER }}/log.html"

          # Properly format body with newlines
          COMMENT_BODY="### 🤖 Robot Framework Test Results

          The integration test run has finished. You can view the full HTML report (including images and videos) here:

          🔗 **<a href="${REPORT_URL}" target="_blank">View Test Report</a>**

          _Note: This report will be retained for 7 days._"

          # Use gh cli to check for existing comments to avoid spamming the PR
          EXISTING_COMMENT=$(gh pr view ${{ env.PR_NUMBER }} --json comments --jq ".comments[] | select(.body | contains(\"${REPORT_URL}\")) | .id" | head -n 1)

          if [ -z "$EXISTING_COMMENT" ]; then
            gh pr comment ${{ env.PR_NUMBER }} --body "$COMMENT_BODY"
          else
            echo "Already commented with the report link."
          fi

      - name: Teardown Garden Environment
        if: always()
        env:
          PR_NUMBER: ${{ env.PR_NUMBER }}
          GARDEN_KUBECONTEXT: local
        run: |
          garden cleanup namespace --env pr

          # Delete the manually created namespace to completely decommission the environment
          NAMESPACE="sward-warden-pr-${{ env.PR_NUMBER }}"
          echo "Decommissioning namespace: $NAMESPACE"
          kubectl delete namespace $NAMESPACE --ignore-not-found

  integration:
    name: integration
    needs: [check-paths, run-tests]
    if: always() && github.event_name == 'merge_group'
    runs-on: ubuntu-latest
    steps:
      - name: Check Status
        run: |
          if [[ "${{ needs.check-paths.outputs.run_tests }}" == 'true' ]]; then
            if [[ "${{ needs.run-tests.result }}" != 'success' ]]; then
               echo "Integration tests failed!"
               exit 1
            fi
          fi
          echo "Success!"
