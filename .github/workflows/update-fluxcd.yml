name: Update FluxCD

on:
  push:
    branches: ["main"]
    paths:
      - "sw-fe-container/**"
      - "sw-be-container/**"
      - ".github/workflows/sw-fe-docker-publish.yml"
      - ".github/workflows/sw-be-docker-publish.yml"
      - ".github/workflows/update-fluxcd.yml"

jobs:
  update-fluxcd:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Wait for SW-FE and SW-BE Docker Workflows
        uses: actions/github-script@v7
        with:
          script: |
            const workflowIds = ['sw-fe-docker-publish.yml', 'sw-be-docker-publish.yml'];
            const maxRetries = 60; // Wait up to 30 minutes (30s interval)
            const intervalSeconds = 30;
            const commitSha = context.sha;

            console.log(`Waiting for workflows ${workflowIds.join(', ')} on commit ${commitSha}...`);

            // To track completion of workflows
            const completedWorkflows = new Set();

            for (let i = 0; i < maxRetries; i++) {
              for (const workflowId of workflowIds) {
                if (completedWorkflows.has(workflowId)) continue;

                try {
                  const runs = await github.rest.actions.listWorkflowRuns({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    workflow_id: workflowId,
                    head_sha: commitSha,
                  });

                  if (runs.data.total_count === 0) {
                    console.log(`Workflow run ${workflowId} not found yet. Waiting...`);
                  } else {
                    const run = runs.data.workflow_runs[0];
                    console.log(`Found workflow run: ${workflowId} (ID: ${run.id}, Status: ${run.status}, Conclusion: ${run.conclusion})`);

                    if (run.status === 'completed') {
                      if (run.conclusion === 'success') {
                        console.log(`CI ${workflowId} completed successfully.`);
                        completedWorkflows.add(workflowId);
                      } else {
                        core.setFailed(`CI workflow ${workflowId} failed with conclusion: ${run.conclusion}`);
                        return;
                      }
                    }
                  }
                } catch (error) {
                  console.log(`Error checking workflow status for ${workflowId}: ${error.message}. Retrying...`);
                }
              }

              if (completedWorkflows.size === workflowIds.length) {
                console.log('All required CI workflows completed successfully.');
                return;
              }
              await new Promise(r => setTimeout(r, intervalSeconds * 1000));
            }
            core.setFailed('Timeout waiting for required CI workflows to complete.');

      - name: Determine Content SHAs
        run: |
          UI_SHA=$(git log -1 --format=%H -- sw-fe-container/ .github/workflows/sw-fe-docker-publish.yml)
          echo "Determined UI content SHA: $UI_SHA"
          echo "UI_SHA=$UI_SHA" >> $GITHUB_ENV

          BACKEND_SHA=$(git log -1 --format=%H -- sw-be-container/ .github/workflows/sw-be-docker-publish.yml)
          echo "Determined Backend content SHA: $BACKEND_SHA"
          echo "BACKEND_SHA=$BACKEND_SHA" >> $GITHUB_ENV

      - name: Update fluxcd-dev tags
        env:
          PAT: ${{ secrets.PAT }}
          GH_TOKEN: ${{ secrets.PAT }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          yq e '(. | select(.kind == "HelmRelease" and .metadata.name == "sward-warden-fe") | .spec.values.image.tag) = "sha-" + env(UI_SHA)' -i fluxcd-dev/sward-warden-fe.yaml
          yq e '(. | select(.kind == "HelmRelease" and .metadata.name == "sward-warden") | .spec.values.image.tag) = "sha-" + env(BACKEND_SHA)' -i fluxcd-dev/sward-warden-be.yaml

          git add fluxcd-dev/sward-warden-fe.yaml fluxcd-dev/sward-warden-be.yaml
          if git diff --staged --quiet; then
            echo "No changes to commit for fluxcd-dev tags."
          else
            git checkout -b fluxcd-dev
            git commit -m "chore: update fluxcd-dev tags for UI and BE"
            git push https://x-access-token:$PAT@github.com/${{ github.repository }}.git fluxcd-dev --force
          fi
