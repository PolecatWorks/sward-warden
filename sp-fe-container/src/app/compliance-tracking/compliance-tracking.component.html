<mat-card>
  <mat-card-header>
    <mat-card-title>Compliance Tracking</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <h3>Alerts & Prohibitions</h3>
    <mat-list>
      <mat-list-item *ngFor="let alert of alerts">
        <mat-icon matListItemIcon *ngIf="alert.type === 'prohibited'" color="warn">error</mat-icon>
        <mat-icon matListItemIcon *ngIf="alert.type === 'warning'" color="accent">warning</mat-icon>
        <div matListItemTitle>{{ alert.message }}</div>
      </mat-list-item>
    </mat-list>

    <h3>Local Regulations Guidelines</h3>
    <mat-list>
      <mat-list-item *ngFor="let reg of regulations">
        <mat-icon matListItemIcon>check_circle</mat-icon>
        <div matListItemTitle>{{ reg }}</div>
      </mat-list-item>
    </mat-list>
  </mat-card-content>
</mat-card>
