kind: Project
name: sward-warden
environments:
  - name: local
  - name: pr
variables:
  current-namespace: ${environment.name == "pr" ? "sward-manager-pr-${env.PR_NUMBER}" : "sward-manager-local"}

---
kind: Deploy
type: helm
name: sward-manager
spec:
  chart: ./charts/sward-manager
  values:
    frontend:
      image:
        repository: ${env.SP_FE_IMAGE || "sward-manager-frontend"}
        tag: ${env.SP_FE_TAG || "latest"}
    backend:
      image:
        repository: ${env.SP_BE_IMAGE || "sward-manager-backend"}
        tag: ${env.SP_BE_TAG || "latest"}
