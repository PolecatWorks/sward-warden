<div class="user-list-container">
  <header class="section-header">
    <h2>User Administration</h2>
    <p>Manage application users and their roles.</p>
  </header>

  <div *ngIf="loading()" class="loading-state">
    Loading users...
  </div>

  <div *ngIf="error()" class="error-state">
    {{ error() }}
    <button (click)="loadUsers()">Retry</button>
  </div>

  <div *ngIf="!loading() && !error()" class="table-container">
    <table class="admin-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Email</th>
          <th>Role</th>
          <th>Suspended</th>
          <th>Modules</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let user of users()">
          <td>{{ user.id }}</td>
          <td>{{ user.name }}</td>
          <td>{{ user.email }}</td>
          <td>
            <span class="role-badge" [ngClass]="user.role">
              {{ user.role }}
            </span>
          </td>
          <td>
            <span class="status-badge" [ngClass]="user.is_suspended ? 'suspended' : 'active'">
              {{ user.is_suspended ? 'Suspended' : 'Active' }}
            </span>
            <button class="btn-small" (click)="toggleSuspension(user)">
              {{ user.is_suspended ? 'Unsuspend' : 'Suspend' }}
            </button>
          </td>
          <td>
            <div class="module-tags">
              <span class="module-tag" *ngFor="let mod of user.modules">{{ mod }}</span>
            </div>
            <button class="btn-small" (click)="toggleModule(user, 'reports_and_analysis')">
              Toggle Reports
            </button>
          </td>
          <td>
            <button class="btn-icon" title="Edit">Edit</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
